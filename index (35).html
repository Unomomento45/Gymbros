<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymBros">
<link rel="manifest" href="manifest.json">
<title>GymBros</title>
<style>
  :root {
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #16213e;
    --card: #1e1e35;
    --card2: #252545;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --red: #ff4757;
    --green: #2ed573;
    --orange: #ffa502;
    --text: #f0f0ff;
    --text2: #9090b8;
    --text3: #6060a0;
    --border: rgba(108,99,255,0.2);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  
  #app { height: 100vh; display: flex; flex-direction: column; }
  
  .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }
  
  /* SPLASH */
  #splash { background: var(--bg); align-items: center; justify-content: center; flex-direction: column; gap: 24px; }
  .splash-logo { font-size: 72px; }
  .splash-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  .splash-title span { color: var(--accent2); }
  .splash-sub { color: var(--text2); font-size: 15px; }
  .splash-profiles { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; padding: 0 20px; }
  .profile-btn {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .profile-btn:active { transform: scale(0.97); background: var(--card2); }
  .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .av1 { background: rgba(108,99,255,0.25); color: var(--accent2); }
  .av2 { background: rgba(255,71,87,0.2); color: #ff6b7a; }
  .av3 { background: rgba(46,213,115,0.2); color: var(--green); }
  .profile-info { flex: 1; }
  .profile-name { font-weight: 600; font-size: 16px; }
  .profile-last { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .profile-arrow { color: var(--text3); font-size: 18px; }
  .btn-settings-wrap { display: flex; justify-content: center; margin-top: 8px; }
  .btn-link { background: none; border: none; color: var(--text3); font-size: 13px; padding: 8px; cursor: pointer; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
  .header-name { font-weight: 600; font-size: 17px; }
  .header-date { font-size: 12px; color: var(--text2); }
  .btn-icon { background: none; border: none; color: var(--text2); font-size: 22px; padding: 4px; cursor: pointer; }

  /* TAB BAR */
  .tabbar {
    display: flex; background: var(--bg2);
    border-top: 1px solid var(--border); flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 10px 4px 8px; background: none; border: none;
    color: var(--text3); cursor: pointer; transition: color 0.2s; font-size: 10px;
  }
  .tab-btn.active { color: var(--accent2); }
  .tab-btn svg { width: 22px; height: 22px; }

  /* CONTENT SCROLL */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .content::-webkit-scrollbar { display: none; }
  .pad { padding: 16px 16px 20px; }

  /* HOME TAB */
  .greeting { margin-bottom: 20px; }
  .greeting h2 { font-size: 22px; font-weight: 700; }
  .greeting p { color: var(--text2); font-size: 14px; margin-top: 4px; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

  .recent-list { display: flex; flex-direction: column; gap: 10px; }
  .recent-item {
    background: var(--card); border-radius: var(--radius); padding: 14px 16px;
    border: 1px solid var(--border); display: flex; align-items: center; gap: 14px;
  }
  .recent-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(108,99,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .recent-name { font-weight: 500; font-size: 15px; }
  .recent-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .recent-weight { font-weight: 700; color: var(--accent2); font-size: 15px; margin-left: auto; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* LOG TAB */
  .date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .date-label { font-size: 16px; font-weight: 600; }
  .date-nav { display: flex; gap: 8px; }
  .btn-nav { background: var(--card); border: 1px solid var(--border); border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 16px; }

  .btn-add-exercise {
    width: 100%; padding: 14px; background: var(--accent); border: none;
    border-radius: var(--radius); color: white; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
  }
  .btn-add-exercise:active { transform: scale(0.98); opacity: 0.9; }

  .exercise-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .exercise-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
  .exercise-name { font-weight: 600; font-size: 16px; }
  .btn-del { background: none; border: none; color: var(--red); font-size: 20px; padding: 2px; cursor: pointer; opacity: 0.7; }

  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th { background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 16px; text-align: left; }
  .sets-table td { padding: 8px 16px; border-top: 1px solid rgba(255,255,255,0.04); }
  .sets-table td:last-child { text-align: right; }

  .input-row { display: flex; gap: 8px; padding: 12px 16px; background: var(--bg3); }
  .input-field { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 15px; text-align: center; }
  .input-field::placeholder { color: var(--text3); }
  .btn-add-set { background: var(--accent); border: none; border-radius: var(--radius-sm); color: white; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* MAXES TAB */
  .maxes-grid { display: flex; flex-direction: column; gap: 10px; }
  .max-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
  .max-exercise { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .max-profiles { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .max-profile-cell { text-align: center; }
  .max-who { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .max-val { font-size: 18px; font-weight: 700; }
  .max-val.av1c { color: var(--accent2); }
  .max-val.av2c { color: #ff6b7a; }
  .max-val.av3c { color: var(--green); }
  .max-val.empty { color: var(--text3); font-size: 14px; font-weight: 400; }

  .btn-add-max {
    width: 100%; padding: 14px; background: none; border: 1.5px dashed var(--border);
    border-radius: var(--radius); color: var(--text2); font-size: 15px;
    cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
  }
  .btn-add-max:active { background: var(--card); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border-radius: 20px 20px 0 0; padding: 24px 20px 40px;
    width: 100%; max-width: 480px;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    border-top: 1px solid var(--border);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--text3); border-radius: 2px; margin: 0 auto 20px; }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .modal label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .modal input, .modal select {
    width: 100%; background: var(--card2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 14px; color: var(--text);
    font-size: 16px; margin-bottom: 14px;
  }
  .modal select option { background: var(--bg2); }
  .modal-btns { display: flex; gap: 10px; margin-top: 4px; }
  .btn-confirm { flex: 1; padding: 14px; background: var(--accent); border: none; border-radius: var(--radius); color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-cancel { flex: 0 0 auto; padding: 14px 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 16px; cursor: pointer; }
  
  /* SETTINGS */
  .settings-wrap { padding: 20px 16px; }
  .settings-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
  .settings-item { display: flex; align-items: center; padding: 15px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 14px; }
  .settings-item:last-child { border-bottom: none; }
  .settings-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .settings-item-text .title { font-size: 15px; font-weight: 500; }
  .settings-item-text .sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .settings-input { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 15px; text-align: right; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .tag-pr { background: rgba(255,165,2,0.2); color: var(--orange); }

  /* Strzalka powrotu */
  .btn-back { background: none; border: none; color: var(--text2); font-size: 22px; padding: 4px; cursor: pointer; display: flex; align-items: center; }
</style>
</head>
<body>
<div id="app">

<!-- SPLASH / profile select -->
<div id="splash" class="screen active">
  <div class="splash-logo">🏋️</div>
  <div style="text-align:center">
    <div class="splash-title">Gym<span>Bros</span></div>
    <div class="splash-sub">Wybierz swój profil</div>
  </div>
  <div class="splash-profiles" id="profileList"></div>
  <div class="btn-settings-wrap">
    <button class="btn-link" onclick="openSettings()">⚙ Ustawienia (zmień nazwy)</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="screen">
  <div class="header">
    <div class="header-left">
      <button class="btn-icon btn-back" onclick="backToSplash()">←</button>
      <div id="headerAvatar" class="header-avatar av1"></div>
      <div>
        <div id="headerName" class="header-name">Profil</div>
        <div id="headerDate" class="header-date"></div>
      </div>
    </div>
  </div>

  <div class="content" id="mainContent">
    <!-- tabs rendered here -->
  </div>

  <nav class="tabbar">
    <button class="tab-btn active" onclick="switchTab('home')" id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Start
    </button>
    <button class="tab-btn" onclick="switchTab('log')" id="tab-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Trening
    </button>
    <button class="tab-btn" onclick="switchTab('maxes')" id="tab-maxes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Maksy
    </button>
    <button class="tab-btn" onclick="switchTab('compare')" id="tab-compare">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Ranking
    </button>
  </nav>
</div>

<!-- SETTINGS SCREEN -->
<div id="settingsScreen" class="screen">
  <div class="header">
    <div class="header-left">
      <button class="btn-icon btn-back" onclick="closeSettings()">←</button>
      <div>
        <div class="header-name">Ustawienia</div>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="settings-wrap">
      <div class="section-title" style="margin-bottom:14px">Profile</div>
      <div class="settings-card">
        <div class="settings-item">
          <div class="settings-icon" style="background:rgba(108,99,255,0.2)">🟣</div>
          <div class="settings-item-text" style="flex:1">
            <div class="title">Profil 1</div>
          </div>
          <input class="settings-input" id="nameInput0" maxlength="12" style="max-width:120px">
        </div>
        <div class="settings-item">
          <div class="settings-icon" style="background:rgba(255,71,87,0.2)">🔴</div>
          <div class="settings-item-text" style="flex:1">
            <div class="title">Profil 2</div>
          </div>
          <input class="settings-input" id="nameInput1" maxlength="12" style="max-width:120px">
        </div>
        <div class="settings-item">
          <div class="settings-icon" style="background:rgba(46,213,115,0.2)">🟢</div>
          <div class="settings-item-text" style="flex:1">
            <div class="title">Profil 3</div>
          </div>
          <input class="settings-input" id="nameInput2" maxlength="12" style="max-width:120px">
        </div>
      </div>
      <button class="btn-confirm" onclick="saveSettings()">Zapisz</button>
      <div style="margin-top:30px">
        <div class="section-title" style="margin-bottom:14px">Dane</div>
        <div class="settings-card">
          <div class="settings-item" onclick="exportData()" style="cursor:pointer">
            <div class="settings-icon" style="background:rgba(46,213,115,0.2)">📤</div>
            <div class="settings-item-text">
              <div class="title">Eksportuj dane</div>
              <div class="sub">Skopiuj JSON do schowka</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: add exercise -->
<div class="modal-overlay" id="modalExercise" onclick="closeModalIf(event,'modalExercise')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Dodaj ćwiczenie</h3>
    <label>Nazwa ćwiczenia</label>
    <input type="text" id="exerciseName" placeholder="np. Wyciskanie na ławce" list="exerciseList">
    <datalist id="exerciseList">
      <option value="Wyciskanie na ławce">
      <option value="Przysiad ze sztangą">
      <option value="Martwy ciąg">
      <option value="Wiosłowanie sztangą">
      <option value="Overhead press">
      <option value="Podciąganie">
      <option value="Wyciskanie na suwnicy">
      <option value="Biceps ze sztangą">
      <option value="Triceps wyciąg">
      <option value="Wznosy bokiem">
      <option value="Leg press">
      <option value="Bułgarski przysiad">
      <option value="Hip thrust">
    </datalist>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalExercise')">Anuluj</button>
      <button class="btn-confirm" onclick="confirmAddExercise()">Dodaj</button>
    </div>
  </div>
</div>

<!-- MODAL: add max -->
<div class="modal-overlay" id="modalMax" onclick="closeModalIf(event,'modalMax')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Nowy rekord (1RM)</h3>
    <label>Ćwiczenie</label>
    <input type="text" id="maxExName" placeholder="np. Wyciskanie na ławce" list="exerciseList">
    <label>Twój ciężar (kg)</label>
    <input type="number" id="maxWeight" placeholder="np. 100" min="1" max="500" step="0.5">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalMax')">Anuluj</button>
      <button class="btn-confirm" onclick="confirmAddMax()">Zapisz</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const DEFAULT_NAMES = ['Bartek', 'Kacper', 'Michał'];
const AVATAR_CLASSES = ['av1', 'av2', 'av3'];
const AVATAR_COLORS = ['av1c', 'av2c', 'av3c'];

function loadData() {
  try { return JSON.parse(localStorage.getItem('gymData')) || {}; } catch { return {}; }
}
function saveData(d) { localStorage.setItem('gymData', JSON.stringify(d)); }

function getData() {
  let d = loadData();
  if (!d.profiles) d.profiles = DEFAULT_NAMES.slice();
  if (!d.workouts) d.workouts = {};
  if (!d.maxes) d.maxes = {};
  return d;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentProfile = 0;
let currentTab = 'home';
let logDate = todayStr();
let data = getData();

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function formatDate(str) {
  const [y, m, dy] = str.split('-');
  const months = ['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
  const days = ['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];
  const d = new Date(str + 'T12:00:00');
  return `${days[d.getDay()]}, ${parseInt(dy)} ${months[parseInt(m)-1]} ${y}`;
}

// ─── SPLASH ──────────────────────────────────────────────────────────────────
function renderSplash() {
  data = getData();
  const list = document.getElementById('profileList');
  list.innerHTML = data.profiles.map((name, i) => {
    const initials = name.slice(0,2).toUpperCase();
    const ws = data.workouts[i] || {};
    const lastDate = Object.keys(ws).sort().reverse()[0];
    const lastStr = lastDate ? `Ostatni trening: ${formatDate(lastDate)}` : 'Brak treningów';
    return `<button class="profile-btn" onclick="selectProfile(${i})">
      <div class="avatar ${AVATAR_CLASSES[i]}">${initials}</div>
      <div class="profile-info">
        <div class="profile-name">${name}</div>
        <div class="profile-last">${lastStr}</div>
      </div>
      <div class="profile-arrow">›</div>
    </button>`;
  }).join('');
}

function selectProfile(i) {
  currentProfile = i;
  data = getData();
  const name = data.profiles[i];
  const initials = name.slice(0,2).toUpperCase();
  document.getElementById('headerName').textContent = name;
  document.getElementById('headerAvatar').textContent = initials;
  document.getElementById('headerAvatar').className = `header-avatar ${AVATAR_CLASSES[i]}`;
  logDate = todayStr();
  showScreen('mainApp');
  switchTab('home');
}

function backToSplash() {
  showScreen('splash');
  renderSplash();
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderTab();
}

function renderTab() {
  const content = document.getElementById('mainContent');
  if (currentTab === 'home') renderHome(content);
  else if (currentTab === 'log') renderLog(content);
  else if (currentTab === 'maxes') renderMaxes(content);
  else if (currentTab === 'compare') renderCompare(content);
  document.getElementById('headerDate').textContent = formatDate(todayStr());
}

// ─── HOME ────────────────────────────────────────────────────────────────────
function renderHome(el) {
  data = getData();
  const pid = currentProfile;
  const ws = data.workouts[pid] || {};
  const allDates = Object.keys(ws).sort().reverse();
  const totalSessions = allDates.length;
  const totalSets = allDates.reduce((a,d) => a + (ws[d]||[]).reduce((b,ex) => b + ex.sets.length, 0), 0);

  const name = data.profiles[pid];
  let recentHTML = '';
  if (allDates.length === 0) {
    recentHTML = `<div class="empty-state"><div class="big">💪</div><p>Brak treningów. Zacznij dziś!</p></div>`;
  } else {
    const lastEx = [];
    for (const d of allDates.slice(0,5)) {
      for (const ex of (ws[d]||[])) {
        if (ex.sets.length > 0) {
          const maxSet = ex.sets.reduce((a,s) => s.weight > a.weight ? s : a, ex.sets[0]);
          lastEx.push({ name: ex.name, date: d, weight: maxSet.weight, reps: maxSet.reps });
        }
      }
    }
    recentHTML = lastEx.slice(0,6).map(e => {
      const isPR = isPRForExercise(pid, e.name, e.weight);
      return `<div class="recent-item">
        <div class="recent-icon">${exerciseEmoji(e.name)}</div>
        <div style="flex:1">
          <div class="recent-name">${e.name}${isPR ? '<span class="tag tag-pr">PR</span>':''}</div>
          <div class="recent-meta">${formatDate(e.date)}</div>
        </div>
        <div class="recent-weight">${e.weight}kg</div>
      </div>`;
    }).join('');
  }

  el.innerHTML = `<div class="pad">
    <div class="greeting">
      <h2>Cześć, ${name}! 👊</h2>
      <p>Gotowy na dzisiaj?</p>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">${totalSessions}</div>
        <div class="stat-label">Treningów</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${totalSets}</div>
        <div class="stat-label">Wszystkich serii</div>
      </div>
    </div>
    <div class="section-title">Ostatnie ćwiczenia</div>
    <div class="recent-list">${recentHTML}</div>
  </div>`;
}

function isPRForExercise(pid, exName, weight) {
  const ms = (getData().maxes[pid] || []).find(m => m.name === exName);
  if (!ms) return false;
  return weight >= ms.weight;
}

function exerciseEmoji(name) {
  const map = { 'Wyciskanie': '🏋️', 'Przysiad': '🦵', 'Martwy': '⚡', 'Wiośl': '🚣', 'Press': '💪', 'Podciąg': '🤸', 'Biceps': '💪', 'Triceps': '💪', 'Leg': '🦵', 'Hip': '🍑' };
  for (const [k,v] of Object.entries(map)) if (name.includes(k)) return v;
  return '🏋️';
}

// ─── LOG ─────────────────────────────────────────────────────────────────────
function renderLog(el) {
  data = getData();
  const pid = currentProfile;
  const ws = data.workouts[pid] || {};
  const todayExercises = ws[logDate] || [];

  const setsRows = todayExercises.map((ex, ei) => {
    const rows = ex.sets.map((s, si) => `<tr>
      <td style="color:var(--text2)">${si+1}</td>
      <td>${s.weight} kg</td>
      <td style="color:var(--text2)">${s.reps} powt.</td>
      <td><button onclick="delSet(${ei},${si})" style="background:none;border:none;color:var(--red);font-size:17px;cursor:pointer">×</button></td>
    </tr>`).join('');
    return `<div class="exercise-card">
      <div class="exercise-header">
        <div>
          <div class="exercise-name">${exerciseEmoji(ex.name)} ${ex.name}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${ex.sets.length} seri${ex.sets.length===1?'a':ex.sets.length<5?'e':'i'}</div>
        </div>
        <button class="btn-del" onclick="delExercise(${ei})">🗑</button>
      </div>
      ${rows ? `<table class="sets-table">
        <thead><tr><th>#</th><th>Ciężar</th><th>Powtórzenia</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>` : ''}
      <div class="input-row">
        <input class="input-field" type="number" placeholder="kg" id="w_${ei}" step="0.5" min="0">
        <input class="input-field" type="number" placeholder="powt." id="r_${ei}" min="1" max="100">
        <button class="btn-add-set" onclick="addSet(${ei})">+ Seria</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="pad">
    <div class="date-row">
      <button class="btn-nav" onclick="changeDate(-1)">‹</button>
      <div class="date-label">${formatDate(logDate)}</div>
      <button class="btn-nav" onclick="changeDate(1)">›</button>
    </div>
    <button class="btn-add-exercise" onclick="openModal('modalExercise')">＋ Dodaj ćwiczenie</button>
    ${setsRows || '<div class="empty-state"><div class="big">📋</div><p>Dodaj ćwiczenie aby zacząć trening</p></div>'}
  </div>`;
}

function changeDate(dir) {
  const d = new Date(logDate + 'T12:00:00');
  d.setDate(d.getDate() + dir);
  logDate = d.toISOString().slice(0, 10);
  renderTab();
}

function addSet(ei) {
  const w = parseFloat(document.getElementById('w_' + ei).value);
  const r = parseInt(document.getElementById('r_' + ei).value);
  if (!w || !r || w <= 0 || r <= 0) { alert('Podaj ciężar i liczbę powtórzeń!'); return; }
  data = getData();
  const pid = currentProfile;
  if (!data.workouts[pid]) data.workouts[pid] = {};
  if (!data.workouts[pid][logDate]) data.workouts[pid][logDate] = [];
  data.workouts[pid][logDate][ei].sets.push({ weight: w, reps: r });
  saveData(data);
  renderTab();
}

function delSet(ei, si) {
  data = getData();
  data.workouts[currentProfile][logDate][ei].sets.splice(si, 1);
  saveData(data);
  renderTab();
}

function delExercise(ei) {
  data = getData();
  data.workouts[currentProfile][logDate].splice(ei, 1);
  if (data.workouts[currentProfile][logDate].length === 0) delete data.workouts[currentProfile][logDate];
  saveData(data);
  renderTab();
}

function confirmAddExercise() {
  const name = document.getElementById('exerciseName').value.trim();
  if (!name) return;
  data = getData();
  const pid = currentProfile;
  if (!data.workouts[pid]) data.workouts[pid] = {};
  if (!data.workouts[pid][logDate]) data.workouts[pid][logDate] = [];
  data.workouts[pid][logDate].push({ name, sets: [] });
  saveData(data);
  document.getElementById('exerciseName').value = '';
  closeModal('modalExercise');
  renderTab();
}

// ─── MAXES ───────────────────────────────────────────────────────────────────
function renderMaxes(el) {
  data = getData();
  const allNames = new Set();
  for (let i = 0; i < 3; i++) {
    (data.maxes[i] || []).forEach(m => allNames.add(m.name));
  }

  const cards = [...allNames].map(name => {
    const cells = [0,1,2].map(i => {
      const m = (data.maxes[i] || []).find(x => x.name === name);
      const best = m ? `<div class="max-val ${AVATAR_COLORS[i]}">${m.weight}<span style="font-size:12px;font-weight:400;color:var(--text2)">kg</span></div>` : `<div class="max-val empty">—</div>`;
      return `<div class="max-profile-cell">
        <div class="max-who">${data.profiles[i]}</div>
        ${best}
      </div>`;
    }).join('');
    return `<div class="max-card">
      <div class="max-exercise">${exerciseEmoji(name)} ${name}</div>
      <div class="max-profiles">${cells}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="pad">
    <button class="btn-add-max" onclick="openModal('modalMax')">＋ Dodaj rekord</button>
    ${allNames.size === 0 ? '<div class="empty-state"><div class="big">🏆</div><p>Brak rekordów. Pobij swój 1RM!</p></div>' : ''}
    <div class="maxes-grid">${cards}</div>
  </div>`;
}

function confirmAddMax() {
  const name = document.getElementById('maxExName').value.trim();
  const weight = parseFloat(document.getElementById('maxWeight').value);
  if (!name || !weight) return;
  data = getData();
  const pid = currentProfile;
  if (!data.maxes[pid]) data.maxes[pid] = [];
  const existing = data.maxes[pid].findIndex(m => m.name === name);
  if (existing >= 0) {
    if (weight > data.maxes[pid][existing].weight) {
      data.maxes[pid][existing] = { name, weight, date: todayStr() };
    }
  } else {
    data.maxes[pid].push({ name, weight, date: todayStr() });
  }
  saveData(data);
  document.getElementById('maxExName').value = '';
  document.getElementById('maxWeight').value = '';
  closeModal('modalMax');
  renderTab();
}

// ─── COMPARE / RANKING ───────────────────────────────────────────────────────
function renderCompare(el) {
  data = getData();
  const allNames = new Set();
  for (let i = 0; i < 3; i++) (data.maxes[i]||[]).forEach(m => allNames.add(m.name));

  if (allNames.size === 0) {
    el.innerHTML = `<div class="pad"><div class="empty-state"><div class="big">📊</div><p>Dodaj maksy, aby zobaczyć ranking!</p></div></div>`;
    return;
  }

  const rows = [...allNames].map(name => {
    const vals = [0,1,2].map(i => {
      const m = (data.maxes[i]||[]).find(x => x.name === name);
      return m ? m.weight : 0;
    });
    const maxVal = Math.max(...vals);
    const winner = vals.indexOf(maxVal);
    return { name, vals, winner };
  }).sort((a,b) => Math.max(...b.vals) - Math.max(...a.vals));

  const cards = rows.map(r => {
    const cells = [0,1,2].map(i => {
      const v = r.vals[i];
      const isBest = i === r.winner && v > 0;
      return `<div style="text-align:center">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">${data.profiles[i]}</div>
        <div style="font-size:20px;font-weight:700;${isBest?`color:var(--orange)`:`color:${i===0?'var(--accent2)':i===1?'#ff6b7a':'var(--green)'}`}">${v > 0 ? v+'kg' : '—'}${isBest ? ' 👑' : ''}</div>
      </div>`;
    }).join('');
    return `<div class="max-card">
      <div class="max-exercise" style="margin-bottom:14px">${exerciseEmoji(r.name)} ${r.name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">${cells}</div>
    </div>`;
  }).join('');

  // Streak stats
  const streaks = [0,1,2].map(i => {
    const ws = data.workouts[i] || {};
    return Object.keys(ws).length;
  });

  el.innerHTML = `<div class="pad">
    <div class="section-title" style="margin-bottom:12px">Liczba treningów</div>
    <div class="stats-row" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:20px">
      ${[0,1,2].map(i => `<div class="stat-card" style="text-align:center">
        <div class="stat-num ${AVATAR_COLORS[i]}" style="font-size:22px">${streaks[i]}</div>
        <div class="stat-label">${data.profiles[i]}</div>
      </div>`).join('')}
    </div>
    <div class="section-title" style="margin-bottom:12px">Maksy — porównanie</div>
    <div class="maxes-grid">${cards}</div>
  </div>`;
}

// ─── MODALS ──────────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function closeModalIf(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function openSettings() {
  data = getData();
  for (let i = 0; i < 3; i++) {
    document.getElementById('nameInput' + i).value = data.profiles[i] || DEFAULT_NAMES[i];
  }
  showScreen('settingsScreen');
}
function closeSettings() {
  showScreen('splash');
  renderSplash();
}
function saveSettings() {
  data = getData();
  for (let i = 0; i < 3; i++) {
    const v = document.getElementById('nameInput' + i).value.trim();
    if (v) data.profiles[i] = v;
  }
  saveData(data);
  closeSettings();
}
function exportData() {
  const d = JSON.stringify(getData(), null, 2);
  navigator.clipboard.writeText(d).then(() => alert('Dane skopiowane do schowka! ✅'));
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderSplash();
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>

</html>
